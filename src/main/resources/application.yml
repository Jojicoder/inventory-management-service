spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/study_db
    username: study_user
    password: study_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080